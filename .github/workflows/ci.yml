name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NovaStaff.sln

      - name: Build
        run: dotnet build NovaStaff.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test NovaStaff.sln --no-build --configuration Release --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: test  # Chỉ chạy khi job test pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
