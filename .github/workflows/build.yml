name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    name: Build .NET Backend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore NovaStaff.sln
      
    - name: Build
      run: dotnet build NovaStaff.sln --no-restore --configuration Release

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        
    - name: Install dependencies
      working-directory: ./SV22T1020320.Web
      run: npm ci
      
    - name: Build
      working-directory: ./SV22T1020320.Web
      run: npm run build
